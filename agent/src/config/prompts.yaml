  alignment_prompt: |
    You are evaluating the cross-plan alignment of 3 bug-fixing plans.
    These plans should be consistent — they should target the same bug and related code areas.

    LOCALIZER PLAN:
    {{ localizer_plan }}

    PATCH EDITOR PLAN:
    {{ patch_editor_plan }}

    REPRODUCER PLAN:
    {{ reproducer_plan }}

    ALIGNMENT SCORING (score each metric 0.0 to 1.0)

    LOCALIZER and EDITOR CONSISTENCY:
    - file_overlap: What is the Jaccard similarity of file sets? |L_files ∩ E_files| / |L_files ∪ E_files|
    - function_overlap: What is the Jaccard similarity of function sets?
    - directional_check: Does every file the editor plans to Modify appear in the localizer's Inspect steps? (file modified without being inspected = suspicious)

    REPRODUCER and OTHERS CONSISTENCY:
    - reproducer_coverage: Are the functions the reproducer exercises a subset of localizer ∪ editor functions? |R_funcs ∩ (L_funcs ∪ E_funcs)| / |R_funcs|

    CALL CHAIN COHERENCY:
    - call_chain_coherency: Can entities across all 3 plans be connected in a call graph? Are they in the same call chain (caller→callee relationships)?

    Also provide:
    - issues: List of specific alignment problems found (strings)
    - suggestions: List of specific suggestions to improve alignment (strings)

    Return ONLY valid JSON matching this schema:
    {
      "file_overlap": 0.0,
      "function_overlap": 0.0,
      "directional_check": 0.0,
      "reproducer_coverage": 0.0,
      "call_chain_coherency": 0.0,
      "issues": ["issue1", "issue2"],
      "suggestions": ["suggestion1", "suggestion2"]
    }

  refinement_prompt: |
