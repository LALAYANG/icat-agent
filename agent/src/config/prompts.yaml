    INSTRUCTIONS
    1. Review the issues and suggestions carefully
    2. Improve each plan to address the specific problems identified
    3. Ensure all file paths and function names are concrete and specific
    4. Ensure cross-plan alignment (same files, same functions, coherent call chain)
    5. Keep the same JSON schema for each plan

    Return ONLY valid JSON with keys: localizer_plan, patch_editor_plan, reproducer_plan
    Each value must be a complete plan JSON object (not a string).

