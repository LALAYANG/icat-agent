  quality_prompt: |
    You are evaluating the quality of 3 bug-fixing plans (localizer, patch_editor, reproducer).
    Score each plan INDEPENDENTLY on its role-specific metrics.

    LOCALIZER PLAN:
    {{ localizer_plan }}

    PATCH EDITOR PLAN:
    {{ patch_editor_plan }}

    REPRODUCER PLAN:
    {{ reproducer_plan }}

    ENTITY EXISTENCE CHECK RESULTS:
    {{ entity_existence_results }}

    SCORING RUBRIC (score each metric 0.0 to 1.0)

    LOCALIZER QUALITY:
    - concrete_paths: Are file paths clear, concrete, and specific (not vague module names)?
    - buggy_function_clarity: Is a specific buggy function/entry point identified?
    - specific_code_area: Does it narrow to a specific code area to inspect (not just "look at the file")?
    - entities_exist: Do all mentioned files/functions actually exist in the repo? (Use entity existence results above)

    PATCH EDITOR QUALITY:
    - concrete_paths: Are file paths clear and specific for files to modify?
    - buggy_function_clarity: Is a specific function/entry to modify identified?
    - specific_modification: Is the modification detailed and specific (exact code change described)?
    - entities_exist: Do all mentioned entities exist?
    - detailed_fix_plan: Is there a detailed modification and exploration plan for the fix?
    - multi_file_coverage: Does it cover ALL files needing changes (not just one)?

    REPRODUCER QUALITY:
    - concrete_paths: Are clear paths of function/entry to exercise provided?
    - expected_behavior: Does it mention the expected behavior after the fix?
    - test_design: Does it specify how to test, which test file to change, what is the new test?
    - entities_exist: Do all referenced entities exist?
    - uses_regression_tests: Does it make use of existing regression tests?

    Return ONLY valid JSON matching this schema:
    {
      "localizer": {
        "concrete_paths": 0.0,
        "buggy_function_clarity": 0.0,
        "specific_code_area": 0.0,
        "entities_exist": 0.0,
